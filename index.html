<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Max & Jack's Animal Detective</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Nunito',sans-serif;background:#fdf8ef;min-height:100vh;overflow-x:hidden;}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 700px 500px at 0% 0%,rgba(126,201,75,0.10) 0%,transparent 70%),radial-gradient(ellipse 600px 600px at 100% 100%,rgba(56,178,216,0.09) 0%,transparent 70%);pointer-events:none;z-index:0;}
.wrap{max-width:680px;margin:0 auto;padding:24px 18px 80px;position:relative;z-index:1;}
.header{text-align:center;margin-bottom:28px;}
.badge{display:inline-block;background:#2d7a4f;color:white;font-size:10px;font-weight:800;letter-spacing:2.5px;text-transform:uppercase;padding:5px 14px;border-radius:20px;margin-bottom:10px;}
h1{font-family:'Fredoka One',cursive;font-size:clamp(2rem,7vw,3rem);color:#4a2f14;line-height:1.1;margin-bottom:6px;}
h1 span{color:#2d7a4f;}
.subtitle{color:#7a6a56;font-size:15px;font-weight:700;}
.card{background:white;border-radius:24px;padding:28px 24px;box-shadow:0 4px 0 #c9b99a,0 6px 28px rgba(0,0,0,0.10);}
.start-card{text-align:center;padding:36px 24px;}
.parade{font-size:2.2rem;letter-spacing:4px;display:block;margin-bottom:16px;}
.start-card h2{font-family:'Fredoka One',cursive;font-size:1.7rem;color:#4a2f14;margin-bottom:12px;}
.start-card p{color:#7a6a56;font-size:15px;line-height:1.8;margin-bottom:24px;font-weight:600;}
.start-card p strong{color:#4a2f14;}
.prog-bg{background:#e2d9cc;border-radius:999px;height:10px;overflow:hidden;margin-bottom:6px;}
.prog-bar{height:100%;border-radius:999px;background:linear-gradient(90deg,#7ec94b,#2d7a4f);transition:width 0.5s cubic-bezier(.34,1.56,.64,1);}
.prog-label{text-align:right;font-size:12px;font-weight:800;color:#2d7a4f;margin-bottom:14px;}
.q-tag{font-size:11px;font-weight:900;letter-spacing:2px;text-transform:uppercase;color:#f4913d;margin-bottom:8px;}
.q-emoji{font-size:2rem;display:block;margin-bottom:8px;}
.q-text{font-family:'Fredoka One',cursive;font-size:clamp(1.15rem,3.5vw,1.5rem);color:#4a2f14;margin-bottom:20px;line-height:1.3;}
.opt{display:flex;align-items:center;gap:12px;padding:14px 16px;border:2.5px solid #e8ddd0;border-radius:16px;background:white;cursor:pointer;font-family:'Nunito',sans-serif;font-size:15px;font-weight:700;color:#4a2f14;text-align:left;width:100%;margin-bottom:10px;transition:all 0.12s;}
.opt:hover{border-color:#7ec94b;background:#f2fce8;transform:translateY(-2px);box-shadow:0 4px 14px rgba(126,201,75,0.22);}
.opt-emoji{font-size:1.4rem;flex-shrink:0;width:32px;text-align:center;}
.back-btn{background:none;border:none;color:#a89880;font-family:'Nunito',sans-serif;font-size:13px;font-weight:700;cursor:pointer;margin-top:14px;padding:4px;}
.btn-primary{display:inline-flex;align-items:center;gap:8px;background:#2d7a4f;color:white;border:none;border-radius:16px;padding:14px 28px;font-family:'Fredoka One',cursive;font-size:1.05rem;cursor:pointer;box-shadow:0 4px 0 #1a5c35;margin:4px;transition:all 0.12s;}
.btn-primary:hover{background:#236040;transform:translateY(-2px);box-shadow:0 6px 0 #1a5c35;}
.btn-primary:active{transform:translateY(2px);box-shadow:0 2px 0 #1a5c35;}
.btn-secondary{display:inline-flex;align-items:center;gap:8px;background:white;color:#4a2f14;border:2.5px solid #e0d4c4;border-radius:16px;padding:11px 24px;font-family:'Fredoka One',cursive;font-size:1rem;cursor:pointer;margin:4px;transition:all 0.12s;}
.btn-secondary:hover{border-color:#f4913d;color:#f4913d;transform:translateY(-2px);}
.loading-card{text-align:center;padding:48px 24px;}
.spinner{width:52px;height:52px;border-radius:50%;border:5px solid #e8ddd0;border-top-color:#2d7a4f;margin:0 auto 16px;animation:spin 0.8s linear infinite;}
.loading-title{font-family:'Fredoka One',cursive;font-size:1.4rem;color:#4a2f14;margin-bottom:8px;}
.loading-sub{color:#a89880;font-size:14px;font-weight:700;}
.result-card{text-align:center;padding:32px 24px;}
.result-label{font-size:11px;font-weight:900;letter-spacing:2px;text-transform:uppercase;color:#f4913d;margin-bottom:8px;}
.photo-wrap{width:200px;height:200px;border-radius:50%;overflow:hidden;box-shadow:0 0 0 6px #7ec94b,0 8px 32px rgba(0,0,0,0.18);background:#e8f4e0;display:flex;align-items:center;justify-content:center;margin:0 auto 16px;}
.photo-wrap img{width:100%;height:100%;object-fit:cover;}
.photo-spinner{width:38px;height:38px;border-radius:50%;border:4px solid rgba(126,201,75,0.3);border-top-color:#7ec94b;animation:spin 0.8s linear infinite;}
.photo-credit{font-size:10px;color:#b8a898;margin-top:4px;margin-bottom:10px;}
.photo-credit a{color:#a89880;}
.result-name{font-family:'Fredoka One',cursive;font-size:clamp(1.6rem,5vw,2.2rem);color:#4a2f14;margin-bottom:6px;}
.result-sci{font-size:13px;color:#a89880;font-style:italic;font-weight:600;margin-bottom:10px;}
.where-tag{display:inline-flex;align-items:center;gap:6px;background:#38b2d8;color:white;padding:5px 14px;border-radius:999px;font-size:12px;font-weight:800;margin-bottom:10px;}
.conf-row{display:flex;align-items:center;gap:10px;background:#f6f1e9;border-radius:12px;padding:10px 14px;margin-bottom:14px;justify-content:center;}
.conf-bg{flex:1;max-width:160px;height:8px;background:#e2d9cc;border-radius:999px;overflow:hidden;}
.conf-bar{height:100%;border-radius:999px;background:linear-gradient(90deg,#7ec94b,#2d7a4f);transition:width 1s cubic-bezier(.34,1.56,.64,1) 0.2s;}
.conf-pct{font-size:14px;font-weight:900;color:#2d7a4f;min-width:38px;}
.fact{background:#f2fce8;border-left:4px solid #7ec94b;border-radius:12px;padding:12px 14px;margin-bottom:16px;font-size:14px;color:#374151;line-height:1.75;text-align:left;}
.fact strong{color:#2d7a4f;}
.runners-label{font-family:'Fredoka One',cursive;font-size:0.95rem;color:#b8a898;margin-bottom:10px;text-align:left;}
.runner{display:flex;align-items:center;gap:12px;padding:10px 14px;border-radius:14px;background:#faf7f2;margin-bottom:8px;}
.runner-photo{width:44px;height:44px;border-radius:50%;overflow:hidden;flex-shrink:0;background:#e8f4e0;display:flex;align-items:center;justify-content:center;}
.runner-photo img{width:100%;height:100%;object-fit:cover;}
.runner-photo-spinner{width:22px;height:22px;border-radius:50%;border:3px solid rgba(126,201,75,0.3);border-top-color:#7ec94b;animation:spin 0.8s linear infinite;}
.runner-name{font-weight:800;font-size:14px;color:#4a2f14;}
.runner-pct{font-size:12px;font-weight:700;color:#a89880;}
.err-card{text-align:center;padding:40px 24px;}
.deco{position:fixed;pointer-events:none;z-index:0;opacity:0.10;font-size:3rem;animation:float 7s ease-in-out infinite;}
.deco:nth-child(1){top:4%;left:2%;animation-delay:0s;}
.deco:nth-child(2){top:12%;right:3%;animation-delay:2s;}
.deco:nth-child(3){bottom:18%;left:3%;animation-delay:4s;}
.deco:nth-child(4){bottom:8%;right:5%;animation-delay:1s;}
@keyframes spin{to{transform:rotate(360deg);}}
@keyframes float{0%,100%{transform:translateY(0) rotate(0);}50%{transform:translateY(-14px) rotate(8deg);}}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px);}to{opacity:1;transform:none;}}
.fade-in{animation:fadeUp 0.35s cubic-bezier(.34,1.56,.64,1) both;}
</style>
</head>
<body>
<div class="deco">🌿</div>
<div class="deco">🍃</div>
<div class="deco">🌱</div>
<div class="deco">🌾</div>

<div class="wrap">
  <div class="header">
    <div class="badge">🦘 Max &amp; Jack's</div>
    <h1>Animal <span>Detective</span> 🔍</h1>
    <p class="subtitle">Answer questions — AI identifies your mystery creature!</p>
  </div>
  <div id="app"></div>
</div>

<script>
// ── Branching question tree ────────────────────────────────────────────────
const Q = {
  legs:{id:"legs",emoji:"🦵",text:"Did it have legs — and if so, how many?",
    opts:[
      {e:"🐍",l:"No legs at all — it slithered, wriggled or oozed",v:"0"},
      {e:"🐦",l:"2 legs",v:"2"},
      {e:"🐱",l:"4 legs",v:"4"},
      {e:"🦟",l:"6 legs (insect) or 8+ legs (spider/slater)",v:"6+"},
    ],next:()=>"covering"},

  covering:{id:"covering",emoji:"🪶",text:"What covered its body?",
    opts:[
      {e:"🪶",l:"Feathers",v:"feathers"},
      {e:"🐻",l:"Fur or hair",v:"fur"},
      {e:"🐍",l:"Scales (overlapping, like a snake or fish)",v:"scales"},
      {e:"🪲",l:"Smooth, slimy, shiny or a hard shell",v:"smooth"},
    ],next:(a)=>{
      if(a.legs==="0") return "noleg_shape";
      if(a.legs==="2") return "bird_size";
      if(a.legs==="4") return "fourleg_shape";
      return "invert_type";
    }},

  // ── No legs ──────────────────────────────────────────────────────────────
  noleg_shape:{id:"noleg_shape",emoji:"📐",text:"What was its body like?",
    opts:[
      {e:"🐍",l:"Long and thin — like a rope or ribbon",v:"rope"},
      {e:"🐛",l:"Short and plump — like a grub or worm",v:"short-fat"},
      {e:"🐌",l:"Slimy blob — like a slug or snail",v:"blob"},
      {e:"🐟",l:"Streamlined — like a fish (was in water)",v:"fish"},
    ],next:(a)=>a.noleg_shape==="rope"?"snake_colour":"colour"},

  snake_colour:{id:"snake_colour",emoji:"🎨",text:"What colour was the snake?",
    opts:[
      {e:"🖤",l:"Black or very dark — almost all over",v:"black"},
      {e:"🟤",l:"Brown, olive or tan",v:"brown"},
      {e:"🟡",l:"Grey, cream or yellowish",v:"grey-cream"},
      {e:"🌈",l:"Mixed, patterned or hard to tell",v:"mixed"},
    ],next:()=>"snake_pattern"},

  snake_pattern:{id:"snake_pattern",emoji:"〰️",text:"Did it have a pattern?",
    opts:[
      {e:"〰️",l:"Bands or rings going around the body",v:"banded"},
      {e:"⬛",l:"Mostly plain — one solid colour",v:"plain"},
      {e:"🔴",l:"Red, pink or orange belly visible",v:"red-belly"},
      {e:"🤷",l:"Couldn't see clearly",v:"unknown"},
    ],next:()=>"snake_size"},

  snake_size:{id:"snake_size",emoji:"📏",text:"How long was the snake roughly?",
    opts:[
      {e:"📏",l:"Short — under 50cm (shorter than your arm)",v:"short"},
      {e:"📐",l:"Medium — 50cm to 1 metre",v:"medium"},
      {e:"🐍",l:"Long — over 1 metre",v:"long"},
    ],next:()=>"where"},

  // ── Birds ─────────────────────────────────────────────────────────────────
  bird_size:{id:"bird_size",emoji:"📏",text:"How big was the bird?",
    opts:[
      {e:"🐝",l:"Tiny — smaller than my fist (fairy-wren sized)",v:"tiny"},
      {e:"🐦",l:"Small — sparrow to starling sized",v:"small"},
      {e:"🐧",l:"Medium — pigeon to magpie sized",v:"medium"},
      {e:"🦅",l:"Large — cockatoo, raven or bigger",v:"large"},
    ],next:()=>"bird_colour"},

  bird_colour:{id:"bird_colour",emoji:"🎨",text:"What colour was it mostly?",
    opts:[
      {e:"🖤",l:"Black, or black and white",v:"black-white"},
      {e:"🤎",l:"Brown, tan or speckled",v:"brown"},
      {e:"🤍",l:"White or grey",v:"grey-white"},
      {e:"🌈",l:"Colourful — green, red, yellow, blue etc.",v:"colourful"},
    ],next:()=>"bird_behaviour"},

  bird_behaviour:{id:"bird_behaviour",emoji:"👀",text:"What was it doing?",
    opts:[
      {e:"🎵",l:"Singing or calling loudly",v:"singing"},
      {e:"🌿",l:"Foraging on the ground",v:"ground-forage"},
      {e:"🌳",l:"Sitting in a tree or on a wire",v:"perching"},
      {e:"✈️",l:"Flying overhead or swooping",v:"flying"},
    ],next:()=>"where"},

  // ── 4 legs ────────────────────────────────────────────────────────────────
  fourleg_shape:{id:"fourleg_shape",emoji:"📐",text:"What shape was its body?",
    opts:[
      {e:"🦎",l:"Low to the ground — flat with a long tail (lizard-like)",v:"lizard"},
      {e:"🐱",l:"Upright and rounded — like a cat, possum or rat",v:"upright"},
      {e:"🐸",l:"Squat and wide — like a frog",v:"frog"},
      {e:"🐕",l:"Tall on legs — dog or fox sized",v:"tall"},
    ],next:(a)=>{
      if(a.fourleg_shape==="lizard") return "lizard_colour";
      if(a.fourleg_shape==="frog") return "frog_colour";
      return "mammal_colour";
    }},

  lizard_colour:{id:"lizard_colour",emoji:"🎨",text:"What colour was the lizard?",
    opts:[
      {e:"🤎",l:"Brown, grey or olive",v:"brown"},
      {e:"💚",l:"Green or blue-green",v:"green"},
      {e:"🌈",l:"Grey/brown body — with a blue tongue visible",v:"blue-tongue"},
      {e:"🖤",l:"Very dark or with stripes along the back",v:"dark-stripe"},
    ],next:()=>"lizard_size"},

  lizard_size:{id:"lizard_size",emoji:"📏",text:"How big was the lizard?",
    opts:[
      {e:"🐛",l:"Tiny — fits on my finger",v:"tiny"},
      {e:"📱",l:"Small — about phone-sized",v:"small"},
      {e:"🐱",l:"Medium — up to about 30cm",v:"medium"},
      {e:"🐕",l:"Large — almost dog-sized",v:"large"},
    ],next:()=>"where"},

  frog_colour:{id:"frog_colour",emoji:"🎨",text:"What colour was the frog?",
    opts:[
      {e:"🟤",l:"Brown, grey or speckled",v:"brown"},
      {e:"💚",l:"Green",v:"green"},
      {e:"🤷",l:"It jumped before I could look!",v:"unknown"},
    ],next:()=>"where"},

  mammal_colour:{id:"mammal_colour",emoji:"🎨",text:"What colour was its fur?",
    opts:[
      {e:"🤍",l:"Grey or silver",v:"grey"},
      {e:"🤎",l:"Brown, tan or reddish",v:"brown"},
      {e:"🖤",l:"Black or very dark",v:"black"},
      {e:"🦊",l:"Orange-red (like a fox)",v:"orange"},
    ],next:()=>"mammal_size"},

  mammal_size:{id:"mammal_size",emoji:"📏",text:"How big was it?",
    opts:[
      {e:"🐭",l:"Tiny — mouse or rat sized",v:"tiny"},
      {e:"🐱",l:"Medium — cat or possum sized",v:"medium"},
      {e:"🐕",l:"Large — dog sized or bigger",v:"large"},
    ],next:()=>"mammal_tail"},

  mammal_tail:{id:"mammal_tail",emoji:"🐾",text:"What was its tail like?",
    opts:[
      {e:"🌿",l:"Long and bushy like a bottle brush",v:"bushy"},
      {e:"🌀",l:"Long, thin and curly",v:"curly"},
      {e:"🐭",l:"Long, thin and bare (rat-like)",v:"bare"},
      {e:"🤷",l:"Didn't see the tail",v:"unknown"},
    ],next:()=>"where"},

  // ── Invertebrates ─────────────────────────────────────────────────────────
  invert_type:{id:"invert_type",emoji:"🔎",text:"What type of creature did it look like?",
    opts:[
      {e:"🕷️",l:"Spider — 8 legs, round body",v:"spider"},
      {e:"🐝",l:"Flying insect — bee, wasp, fly or moth",v:"flying-insect"},
      {e:"🐛",l:"Crawling insect — beetle, caterpillar, bug",v:"crawling-insect"},
      {e:"🦟",l:"Tiny and many-legged — slater, centipede, earwig",v:"multi"},
    ],next:()=>"invert_colour"},

  invert_colour:{id:"invert_colour",emoji:"🎨",text:"What colour was it?",
    opts:[
      {e:"🖤",l:"Black or dark brown",v:"black"},
      {e:"🟡",l:"Yellow and black stripes",v:"yellow-black"},
      {e:"🤎",l:"Brown, grey or mottled",v:"brown"},
      {e:"🌈",l:"Colourful — orange, red, green etc.",v:"colourful"},
    ],next:()=>"where"},

  // ── Shared ────────────────────────────────────────────────────────────────
  colour:{id:"colour",emoji:"🎨",text:"What colour was it mainly?",
    opts:[
      {e:"🖤",l:"Black or very dark",v:"black"},
      {e:"🤎",l:"Brown, tan or grey",v:"brown"},
      {e:"💚",l:"Green or blue-green",v:"green"},
      {e:"🤍",l:"White, cream or pale",v:"white"},
    ],next:()=>"where"},

  where:{id:"where",emoji:"📍",text:"Where exactly did you see it?",
    opts:[
      {e:"🌿",l:"On the ground — grass, path, dirt or leaf litter",v:"ground"},
      {e:"🌳",l:"Up in a tree, bush or flying through air",v:"tree"},
      {e:"💧",l:"In or near water — creek, puddle or wet area",v:"water"},
      {e:"🏠",l:"On a wall, fence, roof or inside a building",v:"structure"},
    ],next:()=>"time"},

  time:{id:"time",emoji:"🕐",text:"When did you see it?",
    opts:[
      {e:"☀️",l:"During the day",v:"day"},
      {e:"🌅",l:"Dawn or dusk",v:"dusk"},
      {e:"🌙",l:"At night",v:"night"},
      {e:"🤷",l:"Not sure",v:"any"},
    ],next:null},
};

// ── State ──────────────────────────────────────────────────────────────────
let state = {screen:"start",currentQId:"legs",history:[],answers:{}};

// ── iNaturalist photo ──────────────────────────────────────────────────────
async function fetchPhoto(sciName, commonName) {
  for(const term of [sciName,commonName].filter(Boolean)){
    try{
      const r = await fetch(`https://api.inaturalist.org/v1/taxa?q=${encodeURIComponent(term)}&per_page=1&locale=en`);
      if(!r.ok) continue;
      const d = await r.json();
      const photo = d?.results?.[0]?.default_photo;
      if(photo){
        const url=(photo.medium_url||photo.square_url||"").replace("/square.","/medium.");
        if(url) return {url, attr:photo.attribution||""};
      }
    }catch(e){}
  }
  return null;
}

// ── Claude API ─────────────────────────────────────────────────────────────
async function identify(answers) {
  const summary = Object.entries(answers).map(([k,v])=>`- ${k}: ${v}`).join("\n");
  const prompt = `You are an expert Australian wildlife biologist specialising in urban Melbourne's inner north — Fitzroy, Collingwood, Brunswick, Northcote, Thornbury, Carlton, Coburg, Preston, Reservoir — plus Merri Creek, Darebin Creek, Edinburgh Gardens, Royal Park, and Yarra River parklands.

A child observed an animal and answered:
${summary}

=== ABSOLUTE HARD RULES — NEVER BREAK ===
- legs=0 OR noleg_shape=rope → ONLY snakes, worms, slugs, eels. NEVER any lizard (blue-tongue, skink, water dragon — they ALL have legs).
- legs=2 OR covering=feathers → ONLY birds.
- legs=6+ → ONLY insects, spiders, slaters, centipedes.
- covering=fur → ONLY mammals.

=== SNAKE ID (legs=0, noleg_shape=rope) ===
- snake_colour=black + pattern=plain → Red-bellied Black Snake (Pseudechis porphyriacus)
- snake_colour=black + pattern=banded → Tiger Snake (Notechis scutatus)
- snake_colour=brown + pattern=banded → Tiger Snake
- snake_colour=brown + pattern=plain + long → Eastern Brown Snake (Pseudonaja textilis)
- pattern=red-belly → Red-bellied Black Snake
- where=water → Tiger Snake or Red-bellied Black more likely

=== OTHER ===
- lizard_colour=blue-tongue → Blue-tongue Lizard (Tiliqua scincoides)
- lizard_size=tiny → Garden Skink (Lampropholis guichenoti)
- lizard_size=large + where=water → Eastern Water Dragon (Intellagama lesueurii)
- mammal_tail=bushy → Brushtail Possum (Trichosurus vulpecula)
- mammal_tail=curly → Ringtail Possum (Pseudocheirus peregrinus)
- mammal_tail=bare + tiny → Black Rat or House Mouse
- mammal_colour=orange → Red Fox (Vulpes vulpes)
- bird_colour=black-white + medium → Australian Magpie (Gymnorhina tibicen)
- bird_colour=colourful + small → Rainbow Lorikeet or Eastern Rosella
- bird_colour=black-white + large → Little Raven or Sulphur-crested Cockatoo
- invert_type=spider + black → Redback Spider
- invert_type=flying-insect + yellow-black → European Wasp or Honey Bee

Respond ONLY with valid JSON, no markdown:
{
  "top":{"commonName":"Tiger Snake","scientificName":"Notechis scutatus","emoji":"🐍","confidence":88,"where":"Creekside vegetation and damp gardens","fact":"2-3 fun sentences for a 10-year-old. Include one surprising or funny fact."},
  "runners":[{"commonName":"Eastern Brown Snake","scientificName":"Pseudonaja textilis","emoji":"🐍","confidence":30}]
}
Include 2-3 runners ordered by confidence.`;

  const res = await fetch("/api/identify",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({model:"claude-sonnet-4-5",max_tokens:1000,messages:[{role:"user",content:prompt}]})
  });
  const data = await res.json();
  if(data.error) throw new Error(`API: ${data.error.message}`);
  if(!data.content) throw new Error(`Unexpected: ${JSON.stringify(data).slice(0,200)}`);
  const text = data.content.map(b=>b.text||"").join("");
  const m = text.match(/\{[\s\S]*\}/);
  if(!m) throw new Error("No JSON in response");
  return JSON.parse(m[0]);
}

// ── Render ─────────────────────────────────────────────────────────────────
function render() {
  const app = document.getElementById("app");
  if(state.screen==="start")   app.innerHTML = renderStart();
  else if(state.screen==="quiz")    app.innerHTML = renderQuiz();
  else if(state.screen==="loading") app.innerHTML = renderLoading();
  else if(state.screen==="result")  { app.innerHTML = renderResult(); loadPhotos(); }
  else if(state.screen==="error")   app.innerHTML = renderError();
}

function renderStart(){return`
  <div class="card start-card fade-in">
    <span class="parade">🦝🦎🐦‍⬛🦜🕷️🐍🐸</span>
    <h2>Spot a mystery animal?</h2>
    <p>Answer a few quick questions — they <strong>branch based on your answers</strong>
    to zero in on what you spotted in <strong>Melbourne's inner north!</strong><br><br>
    Backyards, parks, Merri Creek, the Yarra — bring it on! 🌿</p>
    <button class="btn-primary" onclick="startQuiz()">🔍 Start Detecting!</button>
  </div>`;}

function renderQuiz(){
  const q = Q[state.currentQId];
  const answered = state.history.length;
  const pct = Math.min(88,(answered/9)*100);
  return`
  <div class="prog-bg"><div class="prog-bar" style="width:${pct}%"></div></div>
  <div class="prog-label">Question ${answered+1}${answered>0?" of ~9":""}</div>
  <div class="card fade-in">
    <div class="q-tag">Question ${answered+1}</div>
    <span class="q-emoji">${q.emoji}</span>
    <div class="q-text">${q.text}</div>
    <div>
      ${q.opts.map(o=>`<button class="opt" onclick="answer('${q.id}','${o.v}')"><span class="opt-emoji">${o.e}</span><span>${o.l}</span></button>`).join("")}
    </div>
    ${state.history.length>0?`<button class="back-btn" onclick="goBack()">← Back</button>`:""}
  </div>`;}

function renderLoading(){
  const msgs=["Asking the wildlife experts…","Checking Merri Creek records…","Consulting Melbourne field guides…","Identifying your mystery creature…"];
  const msg=msgs[Math.floor(Math.random()*msgs.length)];
  return`<div class="card loading-card fade-in">
    <div class="spinner"></div>
    <div class="loading-title">🔍 Analysing clues…</div>
    <div class="loading-sub">${msg}</div>
  </div>`;}

function renderResult(){
  const {top,runners=[]} = state.result;
  return`<div class="card result-card fade-in" id="result-card">
    <div class="result-label">🎉 I think it's a…</div>
    <div class="photo-wrap" id="photo-main"><div class="photo-spinner"></div></div>
    <div id="photo-credit" class="photo-credit"></div>
    <div class="result-name">${top.commonName}</div>
    <div class="result-sci">${top.scientificName}</div>
    <div class="where-tag">📍 ${top.where}</div>
    <div class="conf-row">
      <span style="font-size:13px;font-weight:800;color:#a89880">Match</span>
      <div class="conf-bg"><div class="conf-bar" id="conf-bar" style="width:0%"></div></div>
      <div class="conf-pct">${top.confidence}%</div>
    </div>
    <div class="fact"><strong>Fun fact! </strong>${top.fact}</div>
    ${runners.length?`
      <div class="runners-label">Other possibilities…</div>
      ${runners.map((r,i)=>`
        <div class="runner">
          <div class="runner-photo" id="rp-${i}"><div class="runner-photo-spinner"></div></div>
          <div>
            <div class="runner-name">${r.commonName}</div>
            <div class="runner-pct">${r.confidence}% match · <em>${r.scientificName}</em></div>
          </div>
        </div>`).join("")}`:""}
    <div style="margin-top:24px;display:flex;flex-wrap:wrap;justify-content:center;">
      <button class="btn-primary" onclick="startQuiz()">🔄 Try Another!</button>
      <button class="btn-secondary" onclick="goHome()">🏠 Home</button>
    </div>
  </div>`;}

function renderError(){return`
  <div class="card err-card fade-in">
    <div style="font-size:3rem;margin-bottom:14px">😬</div>
    <div style="font-family:'Fredoka One',cursive;font-size:1.4rem;color:#4a2f14;margin-bottom:10px">Something went wrong!</div>
    <div style="color:#a89880;font-size:13px;margin-bottom:20px;word-break:break-all;padding:0 8px">${state.error}</div>
    <button class="btn-primary" onclick="startQuiz()">🔄 Try Again</button>
  </div>`;}

async function loadPhotos(){
  const {top,runners=[]} = state.result;
  // Animate confidence bar
  setTimeout(()=>{const b=document.getElementById("conf-bar");if(b)b.style.width=top.confidence+"%";},150);

  // Main photo
  const photo = await fetchPhoto(top.scientificName, top.commonName);
  const wrap = document.getElementById("photo-main");
  if(wrap){
    if(photo){
      const img=new Image();
      img.onload=()=>{
        wrap.innerHTML="";
        const el=document.createElement("img");
        el.src=photo.url; el.alt=top.commonName;
        el.onerror=()=>{wrap.innerHTML=`<span style="font-size:4rem">${top.emoji}</span>`;};
        wrap.appendChild(el);
        const credit=document.getElementById("photo-credit");
        if(credit&&photo.attr) credit.innerHTML=`📷 ${photo.attr} · <a href="https://www.inaturalist.org" target="_blank">iNaturalist</a>`;
      };
      img.onerror=()=>{wrap.innerHTML=`<span style="font-size:4rem">${top.emoji}</span>`;};
      img.src=photo.url;
    } else {
      wrap.innerHTML=`<span style="font-size:4rem">${top.emoji}</span>`;
    }
  }

  // Runner photos
  runners.forEach(async(r,i)=>{
    const p=await fetchPhoto(r.scientificName,r.commonName);
    const el=document.getElementById(`rp-${i}`);
    if(!el) return;
    if(p){
      const img=new Image();
      img.onload=()=>{el.innerHTML="";const im=document.createElement("img");im.src=p.url;im.alt=r.commonName;el.appendChild(im);};
      img.onerror=()=>{el.innerHTML=`<span style="font-size:1.5rem">${r.emoji}</span>`;};
      img.src=p.url;
    } else {
      el.innerHTML=`<span style="font-size:1.5rem">${r.emoji}</span>`;
    }
  });
}

// ── Actions ────────────────────────────────────────────────────────────────
function startQuiz(){state={screen:"quiz",currentQId:"legs",history:[],answers:{}};render();}
function goHome(){state={screen:"start",currentQId:"legs",history:[],answers:{}};render();}

function goBack(){
  if(!state.history.length) return;
  const prev=[...state.history];
  const prevId=prev.pop();
  const ans={...state.answers};
  delete ans[state.currentQId];
  state={...state,history:prev,currentQId:prevId,answers:ans};
  render();
}

async function answer(qId,value){
  const newAnswers={...state.answers,[qId]:value};
  const newHistory=[...state.history,qId];
  const q=Q[qId];
  const nextId=q.next?q.next(newAnswers):null;
  if(nextId&&Q[nextId]){
    state={...state,currentQId:nextId,history:newHistory,answers:newAnswers};
    render();
  } else {
    state={...state,screen:"loading",history:newHistory,answers:newAnswers};
    render();
    try{
      const result=await identify(newAnswers);
      state={...state,screen:"result",result};
      render();
    }catch(e){
      state={...state,screen:"error",error:String(e)};
      render();
    }
  }
}

render();
</script>
</body>
</html>
