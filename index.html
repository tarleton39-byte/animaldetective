<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Max & Jack's Animal Detective</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Nunito',sans-serif;background:#fdf8ef;min-height:100vh;overflow-x:hidden;}
body::before{content:'';position:fixed;inset:0;background:
  radial-gradient(ellipse 700px 500px at 0% 0%,rgba(126,201,75,0.10) 0%,transparent 70%),
  radial-gradient(ellipse 600px 600px at 100% 100%,rgba(56,178,216,0.09) 0%,transparent 70%);
  pointer-events:none;z-index:0;}
.wrap{max-width:680px;margin:0 auto;padding:24px 18px 80px;position:relative;z-index:1;}
.header{text-align:center;margin-bottom:28px;}
.badge{display:inline-block;background:#2d7a4f;color:white;font-size:10px;font-weight:800;
  letter-spacing:2.5px;text-transform:uppercase;padding:5px 14px;border-radius:20px;margin-bottom:10px;}
h1{font-family:'Fredoka One',cursive;font-size:clamp(2rem,7vw,3rem);color:#4a2f14;line-height:1.1;margin-bottom:6px;}
h1 span{color:#2d7a4f;}
.subtitle{color:#7a6a56;font-size:15px;font-weight:700;}
.card{background:white;border-radius:24px;padding:28px 24px;box-shadow:0 4px 0 #c9b99a,0 6px 28px rgba(0,0,0,0.10);}
.start-card{text-align:center;padding:36px 24px;}
.parade{font-size:2.2rem;letter-spacing:4px;display:block;margin-bottom:16px;}
.start-card h2{font-family:'Fredoka One',cursive;font-size:1.7rem;color:#4a2f14;margin-bottom:12px;}
.start-card p{color:#7a6a56;font-size:15px;line-height:1.8;margin-bottom:24px;font-weight:600;}
.start-card p strong{color:#4a2f14;}
.prog-bg{background:#e2d9cc;border-radius:999px;height:10px;overflow:hidden;margin-bottom:6px;}
.prog-bar{height:100%;border-radius:999px;background:linear-gradient(90deg,#7ec94b,#2d7a4f);transition:width 0.5s cubic-bezier(.34,1.56,.64,1);}
.prog-label{text-align:right;font-size:12px;font-weight:800;color:#2d7a4f;margin-bottom:14px;}
.q-tag{font-size:11px;font-weight:900;letter-spacing:2px;text-transform:uppercase;color:#f4913d;margin-bottom:8px;}
.q-emoji{font-size:2rem;display:block;margin-bottom:8px;}
.q-text{font-family:'Fredoka One',cursive;font-size:clamp(1.15rem,3.5vw,1.5rem);color:#4a2f14;margin-bottom:20px;line-height:1.3;}
.opt{display:flex;align-items:center;gap:12px;padding:14px 16px;border:2.5px solid #e8ddd0;border-radius:16px;background:white;cursor:pointer;font-family:'Nunito',sans-serif;font-size:15px;font-weight:700;color:#4a2f14;text-align:left;width:100%;margin-bottom:10px;transition:all 0.12s;}
.opt:hover{border-color:#7ec94b;background:#f2fce8;transform:translateY(-2px);box-shadow:0 4px 14px rgba(126,201,75,0.22);}
.opt-emoji{font-size:1.4rem;flex-shrink:0;width:32px;text-align:center;}
.not-sure-btn{display:flex;align-items:center;gap:10px;padding:11px 16px;border:2px dashed #d4c9bb;border-radius:16px;background:transparent;cursor:pointer;font-family:'Nunito',sans-serif;font-size:14px;font-weight:700;color:#a89880;text-align:left;width:100%;margin-top:4px;margin-bottom:6px;transition:all 0.12s;}
.not-sure-btn:hover{border-color:#f4913d;color:#f4913d;background:#fff5ed;}
.back-btn{background:none;border:none;color:#a89880;font-family:'Nunito',sans-serif;font-size:13px;font-weight:700;cursor:pointer;margin-top:14px;padding:4px;}
.btn-primary{display:inline-flex;align-items:center;gap:8px;background:#2d7a4f;color:white;border:none;border-radius:16px;padding:14px 28px;font-family:'Fredoka One',cursive;font-size:1.05rem;cursor:pointer;box-shadow:0 4px 0 #1a5c35;margin:4px;transition:all 0.12s;}
.btn-primary:hover{background:#236040;transform:translateY(-2px);box-shadow:0 6px 0 #1a5c35;}
.btn-primary:active{transform:translateY(2px);box-shadow:0 2px 0 #1a5c35;}
.btn-secondary{display:inline-flex;align-items:center;gap:8px;background:white;color:#4a2f14;border:2.5px solid #e0d4c4;border-radius:16px;padding:11px 24px;font-family:'Fredoka One',cursive;font-size:1rem;cursor:pointer;margin:4px;transition:all 0.12s;}
.btn-secondary:hover{border-color:#f4913d;color:#f4913d;transform:translateY(-2px);}
.loading-card{text-align:center;padding:48px 24px;}
.spinner{width:52px;height:52px;border-radius:50%;border:5px solid #e8ddd0;border-top-color:#2d7a4f;margin:0 auto 16px;animation:spin 0.8s linear infinite;}
.loading-title{font-family:'Fredoka One',cursive;font-size:1.4rem;color:#4a2f14;margin-bottom:8px;}
.loading-sub{color:#a89880;font-size:14px;font-weight:700;}
.result-card{text-align:center;padding:32px 24px;}
.result-label{font-size:11px;font-weight:900;letter-spacing:2px;text-transform:uppercase;color:#f4913d;margin-bottom:8px;}
.photo-wrap{width:200px;height:200px;border-radius:50%;overflow:hidden;box-shadow:0 0 0 6px #7ec94b,0 8px 32px rgba(0,0,0,0.18);background:#e8f4e0;display:flex;align-items:center;justify-content:center;margin:0 auto 16px;}
.photo-wrap img{width:100%;height:100%;object-fit:cover;}
.photo-spinner{width:38px;height:38px;border-radius:50%;border:4px solid rgba(126,201,75,0.3);border-top-color:#7ec94b;animation:spin 0.8s linear infinite;}
.photo-credit{font-size:10px;color:#b8a898;margin-top:4px;margin-bottom:10px;}
.photo-credit a{color:#a89880;}
.result-name{font-family:'Fredoka One',cursive;font-size:clamp(1.6rem,5vw,2.2rem);color:#4a2f14;margin-bottom:6px;}
.result-sci{font-size:13px;color:#a89880;font-style:italic;font-weight:600;margin-bottom:10px;}
.where-tag{display:inline-flex;align-items:center;gap:6px;background:#38b2d8;color:white;padding:5px 14px;border-radius:999px;font-size:12px;font-weight:800;margin-bottom:10px;}
.conf-row{display:flex;align-items:center;gap:10px;background:#f6f1e9;border-radius:12px;padding:10px 14px;margin-bottom:14px;justify-content:center;}
.conf-bg{flex:1;max-width:160px;height:8px;background:#e2d9cc;border-radius:999px;overflow:hidden;}
.conf-bar{height:100%;border-radius:999px;background:linear-gradient(90deg,#7ec94b,#2d7a4f);transition:width 1s cubic-bezier(.34,1.56,.64,1) 0.2s;}
.conf-pct{font-size:14px;font-weight:900;color:#2d7a4f;min-width:38px;}
.fact{background:#f2fce8;border-left:4px solid #7ec94b;border-radius:12px;padding:12px 14px;margin-bottom:16px;font-size:14px;color:#374151;line-height:1.75;text-align:left;}
.fact strong{color:#2d7a4f;}
.runners-label{font-family:'Fredoka One',cursive;font-size:0.95rem;color:#b8a898;margin-bottom:10px;text-align:left;}
.runner{display:flex;align-items:center;gap:12px;padding:10px 14px;border-radius:14px;background:#faf7f2;margin-bottom:8px;}
.runner-photo{width:44px;height:44px;border-radius:50%;overflow:hidden;flex-shrink:0;background:#e8f4e0;display:flex;align-items:center;justify-content:center;}
.runner-photo img{width:100%;height:100%;object-fit:cover;}
.runner-photo-spinner{width:22px;height:22px;border-radius:50%;border:3px solid rgba(126,201,75,0.3);border-top-color:#7ec94b;animation:spin 0.8s linear infinite;}
.runner-name{font-weight:800;font-size:14px;color:#4a2f14;}
.runner-pct{font-size:12px;font-weight:700;color:#a89880;}

.err-card{text-align:center;padding:40px 24px;}
.deco{position:fixed;pointer-events:none;z-index:0;opacity:0.10;font-size:3rem;animation:float 7s ease-in-out infinite;}
.deco:nth-child(2){top:4%;left:2%;animation-delay:0s;}
.deco:nth-child(3){top:12%;right:3%;animation-delay:2s;}
.deco:nth-child(4){bottom:18%;left:3%;animation-delay:4s;}
.deco:nth-child(5){bottom:8%;right:5%;animation-delay:1s;}
#confetti-canvas{position:fixed;inset:0;pointer-events:none;z-index:999;}
.emoji-burst{position:fixed;pointer-events:none;z-index:1000;font-size:2rem;animation:burstFly 1.2s cubic-bezier(.2,.8,.4,1) forwards;}
@keyframes spin{to{transform:rotate(360deg);}}
@keyframes float{0%,100%{transform:translateY(0) rotate(0);}50%{transform:translateY(-14px) rotate(8deg);}}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px);}to{opacity:1;transform:none;}}
@keyframes burstFly{0%{opacity:1;transform:translate(0,0) scale(1) rotate(0deg);}100%{opacity:0;transform:translate(var(--dx),var(--dy)) scale(0.4) rotate(var(--rot));}}
.fade-in{animation:fadeUp 0.35s cubic-bezier(.34,1.56,.64,1) both;}
</style>
</head>
<body>
<canvas id="confetti-canvas"></canvas>
<div class="deco">🌿</div>
<div class="deco">🍃</div>
<div class="deco">🌱</div>
<div class="deco">🌾</div>
<div class="wrap">
  <div class="header">
    <div class="badge">🦘 Max &amp; Jack's</div>
    <h1>Animal <span>Detective</span> 🔍</h1>
    <p class="subtitle">Answer questions — AI identifies your mystery creature!</p>
  </div>
  <div id="app"></div>
</div>

// ── State ──────────────────────────────────────────────────────────────────
let state = {
  screen: "start",
  node: null,
  history: [],
  answers: [],
  result: null,
  error: null,
};

// ── iNaturalist photo ──────────────────────────────────────────────────────
async function fetchPhoto(sciName, commonName) {
  for (const term of [sciName, commonName].filter(Boolean)) {
    try {
      const r = await fetch("https://api.inaturalist.org/v1/taxa?q=" + encodeURIComponent(term) + "&per_page=1&locale=en");
      if (!r.ok) continue;
      const d = await r.json();
      const photo = d && d.results && d.results[0] && d.results[0].default_photo;
      if (photo) {
        const url = (photo.medium_url || photo.square_url || "").replace("/square.", "/medium.");
        if (url) return { url, attr: photo.attribution || "" };
      }
    } catch(e) {}
  }
  return null;
}

// ── Final identification call ──────────────────────────────────────────────
async function identifyFromAnswers(answers, treeResult) {
  const summary = answers.map(function(a) { return "- " + a.q + ": " + a.a; }).join("\n");
  const hint = treeResult ? " The question tree suggests it might be a " + treeResult.name + "." : "";
  const prompt = "You are an expert Melbourne wildlife biologist. A child in Thornbury, Melbourne answered these questions about an animal they spotted:\n" + summary + hint + "\n\nIdentify the most likely animal from Melbourne's inner north.\nRespond ONLY with valid JSON, no markdown:\n{\"top\":{\"commonName\":\"\",\"scientificName\":\"\",\"emoji\":\"\",\"confidence\":0,\"where\":\"\",\"fact\":\"\"},\"runners\":[{\"commonName\":\"\",\"scientificName\":\"\",\"emoji\":\"\",\"confidence\":0}]}\nThe fact must be 2 genuinely surprising sentences written for a curious 10-year-old. Include 2-3 runners.";
  const res = await fetch("/api/identify", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ model: "claude-sonnet-4-5", max_tokens: 600, messages: [{ role: "user", content: prompt }] })
  });
  const data = await res.json();
  if (data.error) throw new Error("API: " + data.error.message);
  const text = data.content.map(function(b) { return b.text || ""; }).join("");
  const m = text.match(/\{[\s\S]*\}/);
  if (!m) throw new Error("No JSON in response");
  return JSON.parse(m[0]);
}

// ── Start quiz ─────────────────────────────────────────────────────────────
function startQuiz() {
  state = { screen: "quiz", node: NODES.start, history: [], answers: [], result: null, error: null };
  render();
}

// ── Answer — instant client-side navigation ────────────────────────────────
async function answer(optionValue, optionLabel) {
  const node = state.node;
  const chosen = node.options.find(function(o) { return (o.l || o.value || "") === optionValue; });
  if (!chosen) return;

  const newAnswers = state.answers.concat([{ q: node.text, a: optionLabel }]);
  const nextNode = NODES[chosen.next];

  if (!nextNode || nextNode.type === "r") {
    // Reached a result — call API for tailored ID
    state.screen = "loading";
    state.answers = newAnswers;
    render();
    try {
      let finalResult;
      try {
        finalResult = await identifyFromAnswers(newAnswers, nextNode);
      } catch(e2) {
        // Fall back to hardcoded result
        if (nextNode) {
          finalResult = {
            top: { commonName: nextNode.name, scientificName: nextNode.sci, emoji: nextNode.emoji, confidence: nextNode.conf, where: nextNode.where, fact: "This is one of Melbourne's most fascinating local animals!" },
            runners: nextNode.runners || []
          };
        } else {
          finalResult = { top: { commonName: "Mystery Animal", scientificName: "", emoji: "🐾", confidence: 50, where: "Melbourne's inner north", fact: "Melbourne's inner north is home to over 200 animal species!" }, runners: [] };
        }
      }
      state.result = finalResult;
      state.screen = "result";
      render();
    } catch(e) {
      state.screen = "error"; state.error = String(e); render();
    }
    return;
  }

  // Navigate to next question — instant
  state.history = state.history.concat([node]);
  state.answers = newAnswers;
  state.node = nextNode;
  render();
}

// ── Go back ────────────────────────────────────────────────────────────────
function goBack() {
  if (!state.history.length) return;
  state.node = state.history[state.history.length - 1];
  state.history = state.history.slice(0, -1);
  state.answers = state.answers.slice(0, -1);
  render();
}

function goHome() {
  state = { screen: "start", node: null, history: [], answers: [], result: null, error: null };
  render();
}

// ── Confetti ───────────────────────────────────────────────────────────────
function launchConfetti(emoji) {
  const canvas = document.getElementById("confetti-canvas");
  if (!canvas) return;
  const ctx = canvas.getContext("2d");
  canvas.width = window.innerWidth; canvas.height = window.innerHeight;
  const pieces = [];
  const colours = ["#7ec94b","#f4913d","#38b2d8","#f9c74f","#f94144","#90be6d","#577590"];
  for (let i = 0; i < 120; i++) {
    pieces.push({ x: canvas.width/2+(Math.random()-0.5)*200, y: canvas.height*0.35, vx: (Math.random()-0.5)*14, vy: Math.random()*-18-4, rot: Math.random()*360, rotV: (Math.random()-0.5)*12, w: Math.random()*10+6, h: Math.random()*5+3, colour: colours[Math.floor(Math.random()*colours.length)], opacity: 1 });
  }
  const cx = window.innerWidth/2, cy = window.innerHeight*0.35;
  for (let i = 0; i < 8; i++) {
    const el = document.createElement("div"); el.className = "emoji-burst"; el.textContent = emoji;
    const angle = (i/8)*Math.PI*2, dist = 120+Math.random()*80;
    el.style.left = cx+"px"; el.style.top = cy+"px";
    el.style.setProperty("--dx", Math.cos(angle)*dist+"px");
    el.style.setProperty("--dy", Math.sin(angle)*dist+"px");
    el.style.setProperty("--rot", (Math.random()*720-360)+"deg");
    el.style.animationDelay = (Math.random()*0.2)+"s";
    document.body.appendChild(el); setTimeout(function() { el.remove(); }, 1600);
  }
  let frame = 0;
  function draw() {
    ctx.clearRect(0,0,canvas.width,canvas.height);
    pieces.forEach(function(p) {
      p.x+=p.vx; p.vy+=0.55; p.y+=p.vy; p.rot+=p.rotV;
      if (frame > 60) p.opacity -= 0.018;
      ctx.save(); ctx.globalAlpha = Math.max(0,p.opacity); ctx.translate(p.x,p.y);
      ctx.rotate(p.rot*Math.PI/180); ctx.fillStyle = p.colour; ctx.fillRect(-p.w/2,-p.h/2,p.w,p.h); ctx.restore();
    });
    frame++;
    if (frame < 140) requestAnimationFrame(draw);
    else ctx.clearRect(0,0,canvas.width,canvas.height);
  }
  draw();
}

// ── Photos ─────────────────────────────────────────────────────────────────
async function loadPhotos() {
  const top = state.result.top;
  const runners = state.result.runners || [];
  setTimeout(function() { const b = document.getElementById("conf-bar"); if (b) b.style.width = top.confidence + "%"; }, 150);
  const photo = await fetchPhoto(top.scientificName, top.commonName);
  const wrap = document.getElementById("photo-main");
  if (wrap) {
    if (photo) {
      const img = new Image();
      img.onload = function() {
        wrap.innerHTML = "";
        const el = document.createElement("img"); el.src = photo.url; el.alt = top.commonName;
        el.onerror = function() { wrap.innerHTML = "<span style='font-size:4rem'>" + top.emoji + "</span>"; };
        wrap.appendChild(el);
        const credit = document.getElementById("photo-credit");
        if (credit && photo.attr) credit.innerHTML = "📷 " + photo.attr + " · <a href='https://www.inaturalist.org' target='_blank'>iNaturalist</a>";
      };
      img.onerror = function() { wrap.innerHTML = "<span style='font-size:4rem'>" + top.emoji + "</span>"; };
      img.src = photo.url;
    } else { wrap.innerHTML = "<span style='font-size:4rem'>" + top.emoji + "</span>"; }
  }
  runners.forEach(async function(r, i) {
    const p = await fetchPhoto(r.scientificName, r.commonName);
    const el = document.getElementById("rp-" + i); if (!el) return;
    if (p) {
      const img = new Image();
      img.onload = function() { el.innerHTML = ""; const im = document.createElement("img"); im.src = p.url; im.alt = r.commonName; el.appendChild(im); };
      img.onerror = function() { el.innerHTML = "<span style='font-size:1.5rem'>" + r.emoji + "</span>"; };
      img.src = p.url;
    } else { el.innerHTML = "<span style='font-size:1.5rem'>" + r.emoji + "</span>"; }
  });
}

// ── Render ─────────────────────────────────────────────────────────────────
function render() {
  const app = document.getElementById("app");
  if (state.screen === "start")        app.innerHTML = renderStart();
  else if (state.screen === "quiz")    app.innerHTML = renderQuiz();
  else if (state.screen === "loading") app.innerHTML = renderLoading();
  else if (state.screen === "result") {
    app.innerHTML = renderResult();
    loadPhotos();
    const emoji = (state.result && state.result.top && state.result.top.emoji) || "🎉";
    setTimeout(function() { launchConfetti(emoji); }, 400);
  }
  else if (state.screen === "error")   app.innerHTML = renderError();
}

function renderStart() {
  return '<div class="card start-card fade-in"><span class="parade">🦝🦎🐦‍⬛🦜🕷️🐍🐸</span><h2>Spot a mystery animal?</h2><p>Answer a few quick questions and our AI wildlife expert will figure out what you spotted in <strong>Melbourne\'s inner north!</strong><br><br>Backyards, parks, Merri Creek, the Yarra — bring it on! 🌿</p><button class="btn-primary" onclick="startQuiz()">🔍 Start Detecting!</button></div>';
}

function renderQuiz() {
  const node = state.node; if (!node) return renderLoading();
  const qNum = state.history.length + 1;
  const pct = Math.min(90, (qNum / 5) * 100);
  function esc(s) { return String(s).replace(/\\/g, "\\\\").replace(/'/g, "\\'"); }
  const opts = node.options.map(function(o) {
    const val = o.l || o.value || "";
    const lbl = o.l || o.label || "";
    const ico = o.e || o.emoji || "🔍";
    return '<button class="opt" onclick="answer(\'' + esc(val) + '\',\'' + esc(lbl) + '\')"><span class="opt-emoji">' + ico + '</span><span>' + lbl + '</span></button>';
  }).join("");
  const back = state.history.length > 0 ? '<button class="back-btn" onclick="goBack()">← Back</button>' : "";
  return '<div class="prog-bg"><div class="prog-bar" style="width:' + pct + '%"></div></div><div class="prog-label">Question ' + qNum + '</div><div class="card fade-in"><div class="q-tag">Question ' + qNum + '</div><span class="q-emoji">' + (node.emoji || "🔍") + '</span><div class="q-text">' + node.text + '</div><div>' + opts + '</div>' + back + '</div>';
}

function renderLoading() {
  return '<div class="card loading-card fade-in"><div class="spinner"></div><div class="loading-title">🔍 On the case…</div><div class="loading-sub">Checking the Melbourne field guide…</div></div>';
}

function renderResult() {
  const top = state.result.top;
  const runners = state.result.runners || [];
  const runnerHtml = runners.length ? '<div class="runners-label">Other possibilities…</div>' + runners.map(function(r, i) {
    return '<div class="runner"><div class="runner-photo" id="rp-' + i + '"><div class="runner-photo-spinner"></div></div><div><div class="runner-name">' + r.commonName + '</div><div class="runner-pct">' + r.confidence + '% match · <em>' + r.scientificName + '</em></div></div></div>';
  }).join("") : "";
  return '<div class="card result-card fade-in" id="result-card"><div class="result-label">🎉 I think it\'s a…</div><div class="photo-wrap" id="photo-main"><div class="photo-spinner"></div></div><div id="photo-credit" class="photo-credit"></div><div class="result-name">' + top.commonName + '</div><div class="result-sci">' + top.scientificName + '</div><div class="where-tag">📍 ' + top.where + '</div><div class="conf-row"><span style="font-size:13px;font-weight:800;color:#a89880">Match</span><div class="conf-bg"><div class="conf-bar" id="conf-bar" style="width:0%"></div></div><div class="conf-pct">' + top.confidence + '%</div></div><div class="fact"><strong>Fun fact! </strong>' + top.fact + '</div>' + runnerHtml + '<div style="margin-top:16px;display:flex;flex-wrap:wrap;justify-content:center;"><button class="btn-primary" onclick="startQuiz()">🔄 Try Another!</button><button class="btn-secondary" onclick="goHome()">🏠 Home</button></div></div>';
}

function renderError() {
  return '<div class="card err-card fade-in"><div style="font-size:3rem;margin-bottom:14px">😬</div><div style="font-family:\'Fredoka One\',cursive;font-size:1.4rem;color:#4a2f14;margin-bottom:10px">Something went wrong!</div><div style="color:#a89880;font-size:13px;margin-bottom:20px;word-break:break-all;padding:0 8px">' + state.error + '</div><button class="btn-primary" onclick="startQuiz()">🔄 Try Again</button><button class="btn-secondary" onclick="goHome()" style="margin-top:8px">🏠 Home</button></div>';
}

render();
</script>
