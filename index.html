<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Max & Jack's Animal Detective</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Nunito',sans-serif;background:#fdf8ef;min-height:100vh;overflow-x:hidden;}
body::before{content:'';position:fixed;inset:0;background:
  radial-gradient(ellipse 700px 500px at 0% 0%,rgba(126,201,75,0.10) 0%,transparent 70%),
  radial-gradient(ellipse 600px 600px at 100% 100%,rgba(56,178,216,0.09) 0%,transparent 70%);
  pointer-events:none;z-index:0;}
.wrap{max-width:680px;margin:0 auto;padding:24px 18px 80px;position:relative;z-index:1;}
.header{text-align:center;margin-bottom:28px;}
.badge{display:inline-block;background:#2d7a4f;color:white;font-size:10px;font-weight:800;
  letter-spacing:2.5px;text-transform:uppercase;padding:5px 14px;border-radius:20px;margin-bottom:10px;}
h1{font-family:'Fredoka One',cursive;font-size:clamp(2rem,7vw,3rem);color:#4a2f14;line-height:1.1;margin-bottom:6px;}
h1 span{color:#2d7a4f;}
.subtitle{color:#7a6a56;font-size:15px;font-weight:700;}
.card{background:white;border-radius:24px;padding:28px 24px;box-shadow:0 4px 0 #c9b99a,0 6px 28px rgba(0,0,0,0.10);}
.start-card{text-align:center;padding:36px 24px;}
.parade{font-size:2.2rem;letter-spacing:4px;display:block;margin-bottom:16px;}
.start-card h2{font-family:'Fredoka One',cursive;font-size:1.7rem;color:#4a2f14;margin-bottom:12px;}
.start-card p{color:#7a6a56;font-size:15px;line-height:1.8;margin-bottom:24px;font-weight:600;}
.start-card p strong{color:#4a2f14;}
.prog-bg{background:#e2d9cc;border-radius:999px;height:10px;overflow:hidden;margin-bottom:6px;}
.prog-bar{height:100%;border-radius:999px;background:linear-gradient(90deg,#7ec94b,#2d7a4f);transition:width 0.5s cubic-bezier(.34,1.56,.64,1);}
.prog-label{text-align:right;font-size:12px;font-weight:800;color:#2d7a4f;margin-bottom:14px;}
.q-tag{font-size:11px;font-weight:900;letter-spacing:2px;text-transform:uppercase;color:#f4913d;margin-bottom:8px;}
.q-emoji{font-size:2rem;display:block;margin-bottom:8px;}
.q-text{font-family:'Fredoka One',cursive;font-size:clamp(1.15rem,3.5vw,1.5rem);color:#4a2f14;margin-bottom:20px;line-height:1.3;}
.opt{display:flex;align-items:center;gap:12px;padding:14px 16px;border:2.5px solid #e8ddd0;border-radius:16px;background:white;cursor:pointer;font-family:'Nunito',sans-serif;font-size:15px;font-weight:700;color:#4a2f14;text-align:left;width:100%;margin-bottom:10px;transition:all 0.12s;}
.opt:hover{border-color:#7ec94b;background:#f2fce8;transform:translateY(-2px);box-shadow:0 4px 14px rgba(126,201,75,0.22);}
.opt-emoji{font-size:1.4rem;flex-shrink:0;width:32px;text-align:center;}
.not-sure-btn{display:flex;align-items:center;gap:10px;padding:11px 16px;border:2px dashed #d4c9bb;border-radius:16px;background:transparent;cursor:pointer;font-family:'Nunito',sans-serif;font-size:14px;font-weight:700;color:#a89880;text-align:left;width:100%;margin-top:4px;margin-bottom:6px;transition:all 0.12s;}
.not-sure-btn:hover{border-color:#f4913d;color:#f4913d;background:#fff5ed;}
.back-btn{background:none;border:none;color:#a89880;font-family:'Nunito',sans-serif;font-size:13px;font-weight:700;cursor:pointer;margin-top:14px;padding:4px;}
.btn-primary{display:inline-flex;align-items:center;gap:8px;background:#2d7a4f;color:white;border:none;border-radius:16px;padding:14px 28px;font-family:'Fredoka One',cursive;font-size:1.05rem;cursor:pointer;box-shadow:0 4px 0 #1a5c35;margin:4px;transition:all 0.12s;}
.btn-primary:hover{background:#236040;transform:translateY(-2px);box-shadow:0 6px 0 #1a5c35;}
.btn-primary:active{transform:translateY(2px);box-shadow:0 2px 0 #1a5c35;}
.btn-secondary{display:inline-flex;align-items:center;gap:8px;background:white;color:#4a2f14;border:2.5px solid #e0d4c4;border-radius:16px;padding:11px 24px;font-family:'Fredoka One',cursive;font-size:1rem;cursor:pointer;margin:4px;transition:all 0.12s;}
.btn-secondary:hover{border-color:#f4913d;color:#f4913d;transform:translateY(-2px);}
.loading-card{text-align:center;padding:48px 24px;}
.spinner{width:52px;height:52px;border-radius:50%;border:5px solid #e8ddd0;border-top-color:#2d7a4f;margin:0 auto 16px;animation:spin 0.8s linear infinite;}
.loading-title{font-family:'Fredoka One',cursive;font-size:1.4rem;color:#4a2f14;margin-bottom:8px;}
.loading-sub{color:#a89880;font-size:14px;font-weight:700;}
.result-card{text-align:center;padding:32px 24px;}
.result-label{font-size:11px;font-weight:900;letter-spacing:2px;text-transform:uppercase;color:#f4913d;margin-bottom:8px;}
.photo-wrap{width:200px;height:200px;border-radius:50%;overflow:hidden;box-shadow:0 0 0 6px #7ec94b,0 8px 32px rgba(0,0,0,0.18);background:#e8f4e0;display:flex;align-items:center;justify-content:center;margin:0 auto 16px;}
.photo-wrap img{width:100%;height:100%;object-fit:cover;}
.photo-spinner{width:38px;height:38px;border-radius:50%;border:4px solid rgba(126,201,75,0.3);border-top-color:#7ec94b;animation:spin 0.8s linear infinite;}
.photo-credit{font-size:10px;color:#b8a898;margin-top:4px;margin-bottom:10px;}
.photo-credit a{color:#a89880;}
.result-name{font-family:'Fredoka One',cursive;font-size:clamp(1.6rem,5vw,2.2rem);color:#4a2f14;margin-bottom:6px;}
.result-sci{font-size:13px;color:#a89880;font-style:italic;font-weight:600;margin-bottom:10px;}
.where-tag{display:inline-flex;align-items:center;gap:6px;background:#38b2d8;color:white;padding:5px 14px;border-radius:999px;font-size:12px;font-weight:800;margin-bottom:10px;}
.conf-row{display:flex;align-items:center;gap:10px;background:#f6f1e9;border-radius:12px;padding:10px 14px;margin-bottom:14px;justify-content:center;}
.conf-bg{flex:1;max-width:160px;height:8px;background:#e2d9cc;border-radius:999px;overflow:hidden;}
.conf-bar{height:100%;border-radius:999px;background:linear-gradient(90deg,#7ec94b,#2d7a4f);transition:width 1s cubic-bezier(.34,1.56,.64,1) 0.2s;}
.conf-pct{font-size:14px;font-weight:900;color:#2d7a4f;min-width:38px;}
.fact{background:#f2fce8;border-left:4px solid #7ec94b;border-radius:12px;padding:12px 14px;margin-bottom:16px;font-size:14px;color:#374151;line-height:1.75;text-align:left;}
.fact strong{color:#2d7a4f;}
.runners-label{font-family:'Fredoka One',cursive;font-size:0.95rem;color:#b8a898;margin-bottom:10px;text-align:left;}
.runner{display:flex;align-items:center;gap:12px;padding:10px 14px;border-radius:14px;background:#faf7f2;margin-bottom:8px;}
.runner-photo{width:44px;height:44px;border-radius:50%;overflow:hidden;flex-shrink:0;background:#e8f4e0;display:flex;align-items:center;justify-content:center;}
.runner-photo img{width:100%;height:100%;object-fit:cover;}
.runner-photo-spinner{width:22px;height:22px;border-radius:50%;border:3px solid rgba(126,201,75,0.3);border-top-color:#7ec94b;animation:spin 0.8s linear infinite;}
.runner-name{font-weight:800;font-size:14px;color:#4a2f14;}
.runner-pct{font-size:12px;font-weight:700;color:#a89880;}
.feedback-row{display:flex;align-items:center;justify-content:center;gap:12px;margin:18px 0 8px;padding:16px;background:#faf7f2;border-radius:18px;}
.feedback-q{font-family:'Fredoka One',cursive;font-size:1rem;color:#7a6a56;}
.thumb-btn{font-size:1.8rem;background:none;border:2.5px solid #e8ddd0;border-radius:50%;width:52px;height:52px;cursor:pointer;transition:all 0.15s;display:flex;align-items:center;justify-content:center;}
.thumb-btn:hover{transform:scale(1.18);}
.thumb-btn.yes:hover{border-color:#7ec94b;background:#f2fce8;}
.thumb-btn.no:hover{border-color:#f4913d;background:#fff5ed;}
.thumb-btn.selected-yes{border-color:#7ec94b;background:#f2fce8;transform:scale(1.15);}
.thumb-btn.selected-no{border-color:#f4913d;background:#fff5ed;transform:scale(1.15);}
.feedback-thanks{font-size:13px;font-weight:800;color:#a89880;text-align:center;margin-top:4px;}
.err-card{text-align:center;padding:40px 24px;}
.deco{position:fixed;pointer-events:none;z-index:0;opacity:0.10;font-size:3rem;animation:float 7s ease-in-out infinite;}
.deco:nth-child(2){top:4%;left:2%;animation-delay:0s;}
.deco:nth-child(3){top:12%;right:3%;animation-delay:2s;}
.deco:nth-child(4){bottom:18%;left:3%;animation-delay:4s;}
.deco:nth-child(5){bottom:8%;right:5%;animation-delay:1s;}
#confetti-canvas{position:fixed;inset:0;pointer-events:none;z-index:999;}
.emoji-burst{position:fixed;pointer-events:none;z-index:1000;font-size:2rem;animation:burstFly 1.2s cubic-bezier(.2,.8,.4,1) forwards;}
@keyframes spin{to{transform:rotate(360deg);}}
@keyframes float{0%,100%{transform:translateY(0) rotate(0);}50%{transform:translateY(-14px) rotate(8deg);}}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px);}to{opacity:1;transform:none;}}
@keyframes burstFly{0%{opacity:1;transform:translate(0,0) scale(1) rotate(0deg);}100%{opacity:0;transform:translate(var(--dx),var(--dy)) scale(0.4) rotate(var(--rot));}}
.fade-in{animation:fadeUp 0.35s cubic-bezier(.34,1.56,.64,1) both;}
</style>
</head>
<body>
<canvas id="confetti-canvas"></canvas>
<div class="deco">🌿</div>
<div class="deco">🍃</div>
<div class="deco">🌱</div>
<div class="deco">🌾</div>
<div class="wrap">
  <div class="header">
    <div class="badge">🦘 Max &amp; Jack's</div>
    <h1>Animal <span>Detective</span> 🔍</h1>
    <p class="subtitle">Answer questions — AI identifies your mystery creature!</p>
  </div>
  <div id="app"></div>
</div>
<script>
// ── System prompt ──────────────────────────────────────────────────────────
const SYSTEM = `You are a fun, enthusiastic wildlife detective helping children aged 8-12 identify animals they have spotted in Thornbury and the inner north of Melbourne, Australia. This includes backyards, Merri Creek, Darebin Creek, Edinburgh Gardens, Northcote, Preston, Brunswick, Coburg, Fitzroy, Collingwood, and the Yarra River corridor.

You conduct a smart interview to identify the animal. Ask one question at a time. Each question must have 3-5 answer options that are easy for a 10-year-old to understand. Use simple everyday language — no scientific words, no reference to animals they might not know (do not say "starling-sized", say "about the size of a tennis ball"). Use fun emojis.

After each answer, decide whether you have enough information to make a confident identification, or whether you need to ask another question. Ask at most 8 questions total. Always identify the animal by question 8 even if uncertain. If you are very confident after 4-5 questions, go straight to the result.

ALWAYS respond with valid JSON in one of these two formats and nothing else:

If you need more information:
{"type":"question","questionNumber":1,"emoji":"🦵","question":"Did it have legs?","options":[{"emoji":"🐍","label":"No legs at all — it slithered or wriggled","value":"no_legs"},{"emoji":"🐦","label":"2 legs","value":"2_legs"},{"emoji":"🐱","label":"4 legs","value":"4_legs"},{"emoji":"🦟","label":"Lots of legs — 6 or more","value":"many_legs"}]}

If you are ready to identify the animal:
{"type":"result","top":{"commonName":"Common Brushtail Possum","scientificName":"Trichosurus vulpecula","emoji":"🐾","confidence":92,"where":"Roof cavities, garden trees and fence lines","fact":"Brushtail possums are so common in Melbourne that some families name their resident possum! They have a special pouch for their babies and can live for over 10 years."},"runners":[{"commonName":"Common Ringtail Possum","scientificName":"Pseudocheirus peregrinus","emoji":"🐾","confidence":35},{"commonName":"Black Rat","scientificName":"Rattus rattus","emoji":"🐀","confidence":15}]}

Rules:
- Focus on animals actually found in Melbourne inner north: possums, magpies, lorikeets, rosellas, ravens, mynas, blackbirds, blue-tongue lizards, garden skinks, water dragons, snakes (tiger snake, eastern brown snake, red-bellied black snake, carpet python), frogs (common froglet, striped marsh frog, eastern dwarf tree frog), huntsman spiders, redback spiders, garden orb weavers, daddy-long-legs, European wasps, honey bees, monarch butterflies, cabbage white butterflies, foxes, rats, mice, microbats, tawny frogmouths, powerful owls, boobook owls, willie wagtails, welcome swallows, grey fantails, spotted doves, crested pigeons, sulphur-crested cockatoos, galahs, little corellas, and any other species plausibly seen in inner Melbourne.
- Ask smart follow-up questions based on previous answers. If they say bird, ask about size then colour. If they say snake, ask about colour and pattern. If they say spider, ask about size and whether it had a web.
- Keep questions visual and concrete — kids remember what they saw, not technical details.
- The fact must be 2 sentences, genuinely surprising or funny, written for a curious 10-year-old.
- confidence is a number 0-100.
- Include 2-3 runners in results ordered by confidence descending.
- NEVER include any text outside the JSON. No preamble, no explanation, no markdown fences.`;

// ── State ──────────────────────────────────────────────────────────────────
let state = {screen:"start",messages:[],questionNumber:0,currentQuestion:null,result:null,error:null};

// ── iNaturalist photo ──────────────────────────────────────────────────────
async function fetchPhoto(sciName,commonName){
  for(const term of [sciName,commonName].filter(Boolean)){
    try{
      const r=await fetch(`https://api.inaturalist.org/v1/taxa?q=${encodeURIComponent(term)}&per_page=1&locale=en`);
      if(!r.ok) continue;
      const d=await r.json();
      const photo=d?.results?.[0]?.default_photo;
      if(photo){const url=(photo.medium_url||photo.square_url||"").replace("/square.","/medium.");if(url)return{url,attr:photo.attribution||""};}
    }catch(e){}
  }
  return null;
}

// ── API call ───────────────────────────────────────────────────────────────
async function callClaude(messages){
  const res=await fetch("/api/identify",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({model:"claude-sonnet-4-5",max_tokens:1000,system:SYSTEM,messages})
  });
  const data=await res.json();
  if(data.error) throw new Error(`API: ${data.error.message}`);
  if(!data.content) throw new Error(`Unexpected: ${JSON.stringify(data).slice(0,200)}`);
  const text=data.content.map(b=>b.text||"").join("");
  const m=text.match(/\{[\s\S]*\}/);
  if(!m) throw new Error("No JSON in response");
  return JSON.parse(m[0]);
}

// ── Start — ask first question ─────────────────────────────────────────────
async function startQuiz(){
  state={screen:"loading",messages:[],questionNumber:0,currentQuestion:null,result:null,error:null};
  render();
  try{
    const messages=[{role:"user",content:"I just spotted an animal in my backyard in Thornbury, Melbourne. Help me identify it!"}];
    const response=await callClaude(messages);
    state.messages=[...messages,{role:"assistant",content:JSON.stringify(response)}];
    state.currentQuestion=response;
    state.questionNumber=response.questionNumber||1;
    state.screen="quiz";
    render();
  }catch(e){state.screen="error";state.error=String(e);render();}
}

// ── Answer a question ──────────────────────────────────────────────────────
async function answer(optionValue,optionLabel){
  const q=state.currentQuestion;
  const userMsg=`Q: ${q.question}\nA: ${optionLabel}`;
  const newMessages=[...state.messages,{role:"user",content:userMsg}];
  state.screen="loading";render();
  try{
    const response=await callClaude(newMessages);
    state.messages=[...newMessages,{role:"assistant",content:JSON.stringify(response)}];
    if(response.type==="result"){
      state.result=response;state.screen="result";
    }else{
      state.currentQuestion=response;
      state.questionNumber=response.questionNumber||state.questionNumber+1;
      state.screen="quiz";
    }
    render();
  }catch(e){state.screen="error";state.error=String(e);render();}
}

// ── Go back ────────────────────────────────────────────────────────────────
function goBack(){
  if(state.messages.length<=2) return;
  const trimmed=state.messages.slice(0,-2);
  const prevAssistant=trimmed[trimmed.length-1];
  try{
    const prevQ=JSON.parse(prevAssistant.content);
    state.messages=trimmed;state.currentQuestion=prevQ;
    state.questionNumber=prevQ.questionNumber||Math.max(1,state.questionNumber-1);
    state.screen="quiz";render();
  }catch(e){goHome();}
}

function goHome(){
  state={screen:"start",messages:[],questionNumber:0,currentQuestion:null,result:null,error:null};render();
}

// ── Confetti ───────────────────────────────────────────────────────────────
function launchConfetti(emoji){
  const canvas=document.getElementById("confetti-canvas");
  if(!canvas)return;
  const ctx=canvas.getContext("2d");
  canvas.width=window.innerWidth;canvas.height=window.innerHeight;
  const pieces=[];
  const colours=["#7ec94b","#f4913d","#38b2d8","#f9c74f","#f94144","#90be6d","#577590"];
  for(let i=0;i<120;i++){pieces.push({x:canvas.width/2+(Math.random()-0.5)*200,y:canvas.height*0.35,vx:(Math.random()-0.5)*14,vy:Math.random()*-18-4,rot:Math.random()*360,rotV:(Math.random()-0.5)*12,w:Math.random()*10+6,h:Math.random()*5+3,colour:colours[Math.floor(Math.random()*colours.length)],opacity:1});}
  const cx=window.innerWidth/2,cy=window.innerHeight*0.35;
  for(let i=0;i<8;i++){
    const el=document.createElement("div");el.className="emoji-burst";el.textContent=emoji;
    const angle=(i/8)*Math.PI*2,dist=120+Math.random()*80;
    el.style.left=cx+"px";el.style.top=cy+"px";
    el.style.setProperty("--dx",Math.cos(angle)*dist+"px");
    el.style.setProperty("--dy",Math.sin(angle)*dist+"px");
    el.style.setProperty("--rot",(Math.random()*720-360)+"deg");
    el.style.animationDelay=(Math.random()*0.2)+"s";
    document.body.appendChild(el);setTimeout(()=>el.remove(),1600);
  }
  let frame=0;
  function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    pieces.forEach(p=>{
      p.x+=p.vx;p.vy+=0.55;p.y+=p.vy;p.rot+=p.rotV;
      if(frame>60)p.opacity-=0.018;
      ctx.save();ctx.globalAlpha=Math.max(0,p.opacity);ctx.translate(p.x,p.y);ctx.rotate(p.rot*Math.PI/180);ctx.fillStyle=p.colour;ctx.fillRect(-p.w/2,-p.h/2,p.w,p.h);ctx.restore();
    });
    frame++;if(frame<140)requestAnimationFrame(draw);else ctx.clearRect(0,0,canvas.width,canvas.height);
  }
  draw();
}

// ── Thumbs ─────────────────────────────────────────────────────────────────
function thumbFeedback(correct){
  const yes=document.getElementById("thumb-yes"),no=document.getElementById("thumb-no"),thanks=document.getElementById("feedback-thanks");
  if(!yes||!no)return;
  yes.classList.remove("selected-yes","selected-no");no.classList.remove("selected-yes","selected-no");
  if(correct){yes.classList.add("selected-yes");thanks.textContent="Awesome! 🎉 Glad we nailed it!";}
  else{no.classList.add("selected-no");thanks.textContent="Thanks for letting us know — we'll try harder next time! 🔍";}
  yes.disabled=true;no.disabled=true;thanks.style.display="block";
}

// ── Photos ─────────────────────────────────────────────────────────────────
async function loadPhotos(){
  const{top,runners=[]}=state.result;
  setTimeout(()=>{const b=document.getElementById("conf-bar");if(b)b.style.width=top.confidence+"%";},150);
  const photo=await fetchPhoto(top.scientificName,top.commonName);
  const wrap=document.getElementById("photo-main");
  if(wrap){
    if(photo){
      const img=new Image();
      img.onload=()=>{wrap.innerHTML="";const el=document.createElement("img");el.src=photo.url;el.alt=top.commonName;el.onerror=()=>{wrap.innerHTML=`<span style="font-size:4rem">${top.emoji}</span>`;};wrap.appendChild(el);const credit=document.getElementById("photo-credit");if(credit&&photo.attr)credit.innerHTML=`📷 ${photo.attr} · <a href="https://www.inaturalist.org" target="_blank">iNaturalist</a>`;};
      img.onerror=()=>{wrap.innerHTML=`<span style="font-size:4rem">${top.emoji}</span>`;};
      img.src=photo.url;
    }else{wrap.innerHTML=`<span style="font-size:4rem">${top.emoji}</span>`;}
  }
  runners.forEach(async(r,i)=>{
    const p=await fetchPhoto(r.scientificName,r.commonName);
    const el=document.getElementById(`rp-${i}`);if(!el)return;
    if(p){const img=new Image();img.onload=()=>{el.innerHTML="";const im=document.createElement("img");im.src=p.url;im.alt=r.commonName;el.appendChild(im);};img.onerror=()=>{el.innerHTML=`<span style="font-size:1.5rem">${r.emoji}</span>`;};img.src=p.url;}
    else{el.innerHTML=`<span style="font-size:1.5rem">${r.emoji}</span>`;}
  });
}

// ── Render ─────────────────────────────────────────────────────────────────
function render(){
  const app=document.getElementById("app");
  if(state.screen==="start") app.innerHTML=renderStart();
  else if(state.screen==="quiz") app.innerHTML=renderQuiz();
  else if(state.screen==="loading") app.innerHTML=renderLoading();
  else if(state.screen==="result"){app.innerHTML=renderResult();loadPhotos();setTimeout(()=>launchConfetti(state.result&&state.result.top&&state.result.top.emoji||"🎉"),400);}
  else if(state.screen==="error") app.innerHTML=renderError();
}

function renderStart(){return`<div class="card start-card fade-in">
  <span class="parade">🦝🦎🐦‍⬛🦜🕷️🐍🐸</span>
  <h2>Spot a mystery animal?</h2>
  <p>Our AI wildlife expert will ask you a few smart questions to figure out what you spotted in <strong>Melbourne's inner north!</strong><br><br>Backyards, parks, Merri Creek, the Yarra — bring it on! 🌿</p>
  <button class="btn-primary" onclick="startQuiz()">🔍 Start Detecting!</button>
</div>`;}

function renderQuiz(){
  const q=state.currentQuestion;if(!q)return renderLoading();
  const qNum=state.questionNumber;
  const pct=Math.min(90,(qNum/8)*100);
  const canGoBack=state.messages.length>2;
  // Escape single quotes in labels for inline onclick
  const esc=s=>s.replace(/\\/g,"\\\\").replace(/'/g,"\\'");
  return`
  <div class="prog-bg"><div class="prog-bar" style="width:${pct}%"></div></div>
  <div class="prog-label">Question ${qNum} of up to 8</div>
  <div class="card fade-in">
    <div class="q-tag">Question ${qNum}</div>
    <span class="q-emoji">${q.emoji||"🔍"}</span>
    <div class="q-text">${q.question}</div>
    <div>
      ${q.options.map(o=>`<button class="opt" onclick="answer('${esc(o.value)}','${esc(o.label)}')"><span class="opt-emoji">${o.emoji}</span><span>${o.label}</span></button>`).join("")}
      <button class="not-sure-btn" onclick="answer('not_sure','Not sure — I couldn\\'t tell')">
        <span style="font-size:1.2rem">🤷</span><span>Not sure — I couldn't tell</span>
      </button>
    </div>
    ${canGoBack?`<button class="back-btn" onclick="goBack()">← Back</button>`:""}
  </div>`;}

function renderLoading(){
  const msgs=["Asking the wildlife experts…","Checking Merri Creek records…","Consulting Melbourne field guides…","Thinking about what it could be…","Analysing your clues…"];
  return`<div class="card loading-card fade-in">
  <div class="spinner"></div>
  <div class="loading-title">🔍 On the case…</div>
  <div class="loading-sub">${msgs[Math.floor(Math.random()*msgs.length)]}</div>
</div>`;}

function renderResult(){
  const{top,runners=[]}=state.result;
  return`<div class="card result-card fade-in" id="result-card">
  <div class="result-label">🎉 I think it's a…</div>
  <div class="photo-wrap" id="photo-main"><div class="photo-spinner"></div></div>
  <div id="photo-credit" class="photo-credit"></div>
  <div class="result-name">${top.commonName}</div>
  <div class="result-sci">${top.scientificName}</div>
  <div class="where-tag">📍 ${top.where}</div>
  <div class="conf-row">
    <span style="font-size:13px;font-weight:800;color:#a89880">Match</span>
    <div class="conf-bg"><div class="conf-bar" id="conf-bar" style="width:0%"></div></div>
    <div class="conf-pct">${top.confidence}%</div>
  </div>
  <div class="fact"><strong>Fun fact! </strong>${top.fact}</div>
  ${runners.length?`<div class="runners-label">Other possibilities…</div>${runners.map((r,i)=>`<div class="runner"><div class="runner-photo" id="rp-${i}"><div class="runner-photo-spinner"></div></div><div><div class="runner-name">${r.commonName}</div><div class="runner-pct">${r.confidence}% match · <em>${r.scientificName}</em></div></div></div>`).join("")}`:""}
  <div class="feedback-row" id="feedback-row">
    <span class="feedback-q">Did we get it right?</span>
    <button class="thumb-btn yes" id="thumb-yes" onclick="thumbFeedback(true)">👍</button>
    <button class="thumb-btn no" id="thumb-no" onclick="thumbFeedback(false)">👎</button>
  </div>
  <div id="feedback-thanks" style="display:none;" class="feedback-thanks"></div>
  <div style="margin-top:16px;display:flex;flex-wrap:wrap;justify-content:center;">
    <button class="btn-primary" onclick="startQuiz()">🔄 Try Another!</button>
    <button class="btn-secondary" onclick="goHome()">🏠 Home</button>
  </div>
</div>`;}

function renderError(){return`<div class="card err-card fade-in">
  <div style="font-size:3rem;margin-bottom:14px">😬</div>
  <div style="font-family:'Fredoka One',cursive;font-size:1.4rem;color:#4a2f14;margin-bottom:10px">Something went wrong!</div>
  <div style="color:#a89880;font-size:13px;margin-bottom:20px;word-break:break-all;padding:0 8px">${state.error}</div>
  <button class="btn-primary" onclick="startQuiz()">🔄 Try Again</button>
  <button class="btn-secondary" onclick="goHome()" style="margin-top:8px">🏠 Home</button>
</div>`;}

render();
</script>
</body>
</html>
